services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fitcoach
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: fitcoach_dev_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fitCoach-network

  # ── .NET API ────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./FitCoach.API
      dockerfile: Dockerfile
    ports:
      - "5000:80"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=fitcoach;Username=postgres;Password=fitcoach_dev_pass"
      Jwt__Key: "dev-secret-key-change-this-in-production-min32chars"
      Jwt__Issuer: "fitcoach-api"
      Jwt__Audience: "fitcoach-clients"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Next.js Web ─────────────────────────────────────────────────────────────
  web:
    build:
      context: ./FitCoach.Web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
    depends_on:
      - api

volumes:
  postgres_data:
  
networks:
  fitCoach-network:
